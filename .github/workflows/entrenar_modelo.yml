name: Entrenar modelo y actualizar predicciones

on:
  schedule:
    # Corre cada 8 horas (00:00, 08:00, 16:00 UTC)
    - cron: '0 */8 * * *'
  workflow_dispatch: {}  # también permite dispararlo manualmente desde la pestaña Actions
  push:
    paths:
      - 'resultados_manual.csv'  # si editas resultados a mano, corre de inmediato

jobs:
  entrenar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar entrenamiento
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python train_model.py

      - name: Confirmar y subir archivos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.csv historical_data.csv pending_matches.csv models.pkl
          git diff --staged --quiet && echo "Sin cambios, nada que subir" || git commit -m "Actualización automática de predicciones [skip ci]"
          git push
