name: Update Predictions

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install kaggle
    
    - name: Set up Kaggle API
      run: |
        mkdir -p ~/.kaggle
        echo '${{ secrets.KAGGLE_JSON }}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
    
    - name: Download data
      run: |
        kaggle datasets download -d martj42/international-football-results-from-1872-to-2017
        unzip -o international-football-results-from-1872-to-2017.zip
    
    - name: Train model
      run: python train_model.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add predictions.csv historical_data.csv pending_matches.csv
        git commit -m "🤖 Auto-update: Predicciones actualizadas" --allow-empty
        git push
